<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Navbar</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(to right, #0f0c29, #302b63, #24243e);
      color: #fff;
      padding: 1rem 20vw;
      font-family: 'Poppins', sans-serif;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .left {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: bold;
      letter-spacing: 1px;
      background: url('/Assets/logo.png') no-repeat center;
      background-size: cover;
      width: 70px;
      height:70px;
    }
    .left a {
      text-decoration: none;
      color: #ffffff;
    }
    .right ul {
      display: flex;
      align-items: center;
      list-style: none;
      gap: 1rem;
    }
    .right ul li a {
      text-decoration: none;
      color: #fff;
      padding: 0.5rem 1rem;
      border-radius: 50px;
      transition: background 0.3s, transform 0.3s;
      position: relative;
      overflow: hidden;
      display: inline-block;
    }
    .right ul li a:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
    }
    .right ul li a.current {
      background: rgba(255, 255, 255, 0.2);
      color: #0f0c29;
    }
    .right ul li a.current::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 0%;
      height: 3px;
      background: #ffffff;
      border-radius: 2px;
      animation: underlineExpand 0.5s forwards;
    }
    @keyframes underlineExpand {
      from { width: 0%; }
      to { width: 60%; }
    }
    @media (max-width: 1000px) {
      nav {
        flex-direction: column;
        padding: 1rem;
        gap: 1rem;
      }
      .right ul {
        flex-direction: row;
        justify-content: center;
        gap: 1rem;
      }
      .right ul li a {
        font-size: 0;
        position: relative;
        width: 40px;
        height: 40px;
      }
      .right ul li a::before {
        font-size: 1.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
      }
    #home-link::before { content: "\f015"; font-family: "Font Awesome 6 Free"; font-weight: 900; }
#explore-link::before { content: "\f14e"; font-family: "Font Awesome 6 Free"; font-weight: 900; }
#about-link::before { content: "\f05a"; font-family: "Font Awesome 6 Free"; font-weight: 900; }
#discoveries-link::before { content: "\f002"; font-family: "Font Awesome 6 Free"; font-weight: 900; } 

    }
  </style>
</head>
<body>
  <nav>
    <div class="left"><a href="/index.html">AstroSpace</a></div>
    <div class="right">
      <ul>
        <li><a href="/index.html" id="home-link">Home</a></li>
        <li><a href="/explore.html" id="explore-link">Explore Space</a></li>
        <li><a href="/about.html" id="about-link">About</a></li>
        <li><a href="/discoveries.html" id="discoveries-link" class="currenttt">Discoveries</a></li>
      </ul>
    </div>
  </nav>
</body>
</html>
